<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce570"/>
      <stop offset="35%" stop-color="#f4d03f"/>
      <stop offset="65%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce570"/>
      <stop offset="50%" stop-color="#f4d03f"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8941f"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="32" cy="58" rx="22" ry="3" fill="rgba(0,0,0,0.25)"/>

  <!-- Outer rim (dark gold) -->
  <circle cx="32" cy="32" r="30" fill="url(#goldRim)"/>

  <!-- Main coin face (gradient gold) -->
  <circle cx="32" cy="32" r="26" fill="url(#gold)"/>

  <!-- Inner ring detail -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(139,105,20,0.4)" stroke-width="1"/>

  <!-- Inner face (lighter gold) -->
  <circle cx="32" cy="32" r="20" fill="url(#goldInner)"/>

  <!-- Top highlight (gloss) -->
  <ellipse cx="24" cy="20" rx="12" ry="6" fill="rgba(255,255,255,0.35)"/>

  <!-- "A" letter (Antam) -->
  <text x="32" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold"
        text-anchor="middle" fill="#8b6914" stroke="#5c4a0f" stroke-width="0.5">A</text>
</svg>
